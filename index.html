<!DOCTYPE html>
<html>
<head>
    <title>AI Skeet Puller V19.1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Load the Edge Impulse AI Engine (must be in same folder) -->
    <script src="edge-impulse-standalone.js"></script>
    <style>
        body { font-family: Arial; text-align: center; margin-top: 15px; background: #222; color: white;}
        .top-row { display: flex; justify-content: center; gap: 8px; margin: 8px 3%; }
        .top-btn { flex: 1; padding: 12px 2px; font-size: 16px; border-radius: 8px; font-weight: bold; border:none; cursor: pointer; transition: background 0.3s;}
        #arm-status { font-size: 18px; font-weight: bold; color: #aaa; margin: 10px 0; min-height: 24px;}
        #arm-panel { display: flex; justify-content: center; margin: 8px 2%; flex-wrap: wrap; gap: 6px; }
        .arm-btn { flex: 1 1 22%; padding: 12px 0px; font-size: 16px; font-weight: bold; background: #444; color: white; border: 2px solid #222; border-radius: 8px; cursor: pointer;}
        .arm-btn.active { background: #e74c3c; border-color: #ffeb3b; color: white;} 
        .cancel-btn { background: #8b0000; color: #fff; border-color: #ff4444; }
        .delay-row { display: flex; justify-content: space-between; align-items: center; margin: 8px 5%; background: #333; padding: 6px 12px; border-radius: 8px; }
        .delay-label { font-size: 15px; font-weight: bold;}
        .delay-btn { background: #555; color: white; border: none; padding: 6px 16px; font-size: 18px; border-radius: 5px; font-weight: bold; cursor: pointer;}
        .delay-val { font-size: 16px; font-weight: bold; width: 45px; display: inline-block; text-align: center; color: #00d2ff;}
        /* Volume bar (always shown - works in both VOLUME and AI mode) */
        #vol-bar-container { width: 90%; height: 18px; background: #444; margin: 12px auto 4px; border-radius: 9px; overflow: hidden; }
        #vol-bar { width: 0%; height: 100%; background: #0f0; transition: width 0.1s, background 0.2s; }
        #ai-confidence { font-size: 14px; font-weight: bold; color: #0f0; margin: 4px 0; min-height: 18px; }
        #threshLabel { font-size: 14px; }
        #threshVal { font-size: 13px; font-weight: bold; color: #ffeb3b; }
        #md-display { font-size: 14px; color: #aaa; margin-top: 5px; font-weight: bold; transition: color 0.2s;}
        #log { margin-top: 15px; color: #0f0; text-align: left; padding: 8px; font-size: 12px; background: #111; height: 150px; overflow-y: scroll; border: 1px solid #444;}
        #ai-status-row { font-size: 12px; color: #888; margin: 2px 0; }
    </style>
</head>
<body>

    <h2>AI Puller V19 (Edge Impulse)</h2>
    
    <div class="top-row">
        <button id="connectBtn" class="top-btn" style="background: #007BFF; color: white;">Connect BLE</button>
        <button id="listenBtn" class="top-btn" style="background: #28A745; color: white;">Turn On Mic</button>
    </div>
    <div class="top-row">
        <button id="vmBtn" class="top-btn" style="background: #9b59b6; color: white;">Mode: VOICE</button>
        <button id="syncBtn" class="top-btn" style="background: #17a2b8; color: white;">Sync: ON</button>
    </div>
    
    <div id="arm-status">SAFE / DISARMED</div>

    <div id="arm-panel">
        <button id="btn-H" class="arm-btn" onclick="setMode('H')">H</button>
        <button id="btn-L" class="arm-btn" onclick="setMode('L')">L</button>
        <button id="btn-D" class="arm-btn" onclick="setMode('D')">D</button>
        <button id="btn-DR" class="arm-btn" onclick="setMode('DR')">DR</button>
        <button id="btn-HL" class="arm-btn" onclick="setMode('HL')">HL</button>
        <button id="btn-LH" class="arm-btn" onclick="setMode('LH')">LH</button>
        <button id="btn-T" class="arm-btn" onclick="setMode('T')">T (H)</button>
        <button id="btn-CANCEL" class="arm-btn cancel-btn" onclick="cancelMode()">CANCEL</button>
    </div>

    <div class="delay-row">
        <span class="delay-label">Delay (D):</span>
        <div>
            <button class="delay-btn" onclick="adjDelay('D', -0.1)">-</button>
            <span class="delay-val" id="val-D">0.0s</span>
            <button class="delay-btn" onclick="adjDelay('D', 0.1)">+</button>
        </div>
    </div>
    <div class="delay-row">
        <span class="delay-label">Dbl Dly (DD):</span>
        <div>
            <button class="delay-btn" onclick="adjDelay('DD', -0.1)">-</button>
            <span class="delay-val" id="val-DD">0.0s</span>
            <button class="delay-btn" onclick="adjDelay('DD', 0.1)">+</button>
        </div>
    </div>

    <!-- Volume bar always visible for feedback -->
    <div id="vol-bar-container"><div id="vol-bar"></div></div>
    <div id="ai-confidence">AI: Waiting for engine...</div>
    <div id="ai-status-row">Engine not loaded</div>

    <!-- Threshold slider: range 5-150 matches V18 volume scale; AI mode uses 0-100% mapped internally -->
    <label id="threshLabel" for="threshSlider">Trigger Sensitivity: <span id="threshVal">50</span></label><br>
    <input type="range" id="threshSlider" min="5" max="150" value="50" style="width: 80%; margin-top: 5px;">

    <div id="md-display">Mute Delay (MD): 500ms</div>
    <div id="log">--- Debug Log ---<br></div>

<script>
    // =====================================================================
    // STATE & CONSTANTS
    // =====================================================================
    const SERVICE_UUID  = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
    const CHAR_RX_UUID  = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
    const CHAR_TX_UUID  = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";

    let bleDevice, bleCharacteristic, bleTxCharacteristic;
    let isBleConnected = false;

    // Mic state machine (same as V18 — prevents double-triggers)
    // 0 = ready, 1 = triggered/locked, 2 = waiting for quiet
    let micState = 0;
    let isMicActive = false;
    let wasMicActiveBeforeSleep = false;
    let audioContext, audioStream, animId;

    // AI engine state
    let classifierInitialized = false;
    let aiProcessor = null;
    let audioDataBuffer = [];
    let lastAiConfidence = 0;

    // Threshold: single slider, used for BOTH volume mode and AI mode
    // In volume mode: raw volume average vs threshold (5–150 scale)
    // In AI mode:     confidence% vs (threshold / 1.5) maps 5–150 → ~3–100%
    let threshold = 50;

    let isSyncEnabled = true;
    let isVoiceMode   = true;
    let armedMode     = null;
    let hlStep        = 0;
    let lastHouse     = 'H';
    let dVal          = 0.0;
    let ddVal         = 0.0;
    let muteDelay     = 500;

    // =====================================================================
    // HELPERS
    // =====================================================================
    function logMsg(msg) {
        const logDiv = document.getElementById('log');
        logDiv.innerHTML = msg + "<br>" + logDiv.innerHTML;
    }

    document.getElementById('threshSlider').oninput = function() {
        threshold = parseInt(this.value);
        document.getElementById('threshVal').innerText = threshold;
    };

    // =====================================================================
    // EDGE IMPULSE AI ENGINE
    // =====================================================================
    async function initAI() {
        if (classifierInitialized) return true;
        logMsg("🧠 Initializing AI Engine...");
        document.getElementById('ai-status-row').innerText = "Loading AI engine...";
        try {
            await window.Module.init();
            classifierInitialized = true;
            logMsg("✅ AI Engine Ready!");
            document.getElementById('ai-status-row').innerText = "AI engine loaded ✅";
            return true;
        } catch (err) {
            logMsg("❌ AI Init Error: " + err);
            document.getElementById('ai-status-row').innerText = "AI engine FAILED — volume mode only";
            return false;
        }
    }

    // Called with 16000 samples of float32 audio
    function runAiInference(dataArray) {
        if (!classifierInitialized) return;
        try {
            let result = window.Module.classify(dataArray);
            for (let i = 0; i < result.results.length; i++) {
                let label = result.results[i].label;
                let value = result.results[i].value;
                if (label === "pull") {
                    let pct = Math.round(value * 100);
                    lastAiConfidence = pct;
                    document.getElementById('ai-confidence').innerText = "AI Confidence: " + pct + "%";

                    // Map slider (5–150) to AI confidence threshold (3–100%)
                    let aiThreshold = threshold / 1.5;

                    if (micState === 0 && pct >= aiThreshold && isVoiceMode) {
                        document.getElementById('ai-confidence').style.color = "#f00";
                        processVoiceTrigger(pct, true);
                    } else if (micState === 2 && pct < (aiThreshold * 0.6)) {
                        micState = 0;
                        document.getElementById('vol-bar').style.background = "#0f0";
                        logMsg("Quiet. Ready for next call.");
                    } else {
                        document.getElementById('ai-confidence').style.color = "#0f0";
                    }
                }
            }
        } catch (err) {
            logMsg("Inference error: " + err);
        }
    }

    // =====================================================================
    // MIC START / STOP  (mirrors V18 architecture exactly)
    // =====================================================================
    async function startMic() {
        // Try to load AI engine (non-blocking — falls back to volume if unavailable)
        if (window.Module) {
            initAI(); // fire and forget; mic starts regardless
        } else {
            logMsg("⚠️ Edge Impulse module not found — using volume detection only.");
            document.getElementById('ai-status-row').innerText = "Volume mode (no AI module)";
        }

        try {
            audioStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            window.AudioContext = window.AudioContext || window.webkitAudioContext;

            // AI requires 16kHz; volume analyser works at any rate.
            // We create the context at 16kHz so both systems share one context.
            audioContext = new window.AudioContext({ sampleRate: 16000 });
            if (audioContext.state === 'suspended') await audioContext.resume();
            if (audioContext.state !== 'running') { logMsg("ERROR: Audio Engine failed."); return; }

            isMicActive = true;
            document.getElementById('listenBtn').innerText = "Mute Mic 🎤";
            document.getElementById('listenBtn').style.background = "#dc3545";
            logMsg("Mic activated. Listening for 'Pull'...");

            const source   = audioContext.createMediaStreamSource(audioStream);

            // --- Volume analyser (same as V18, always active for the bar) ---
            const analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;
            source.connect(analyser);
            const freqData = new Uint8Array(analyser.frequencyBinCount);

            // --- AI ScriptProcessor at 16kHz (4096 samples ≈ 250ms chunks) ---
            if (classifierInitialized || window.Module) {
                aiProcessor = audioContext.createScriptProcessor(4096, 1, 1);
                source.connect(aiProcessor);
                aiProcessor.connect(audioContext.destination);

                aiProcessor.onaudioprocess = function(e) {
                    if (!isMicActive || micState === 1) return;
                    const inputData = e.inputBuffer.getChannelData(0);
                    for (let i = 0; i < inputData.length; i++) audioDataBuffer.push(inputData[i]);

                    // Accumulate 1 second (16000 samples) then infer with sliding window
                    if (audioDataBuffer.length >= 16000) {
                        if (classifierInitialized) runAiInference(audioDataBuffer.slice(0, 16000));
                        audioDataBuffer = audioDataBuffer.slice(4000); // slide 250ms
                    }
                };
            }

            // --- Volume animation loop (V18 style) ---
            function checkVolume() {
                if (!isMicActive) return;
                analyser.getByteFrequencyData(freqData);
                let sum = 0;
                for (let i = 0; i < freqData.length; i++) sum += freqData[i];
                let avgVol = sum / freqData.length;

                document.getElementById('vol-bar').style.width = Math.min(100, (avgVol / 1.5)) + "%";

                // Volume-based trigger: only fires when AI engine is NOT loaded
                if (!classifierInitialized) {
                    if (micState === 0 && avgVol > threshold && isVoiceMode) {
                        processVoiceTrigger(avgVol, false);
                    } else if (micState === 2 && avgVol < (threshold * 0.8)) {
                        micState = 0;
                        document.getElementById('vol-bar').style.background = "#0f0";
                        logMsg("Quiet. Ready for next call.");
                    }
                }

                animId = requestAnimationFrame(checkVolume);
            }
            checkVolume();
            logMsg("✅ Mic successfully activated!");

        } catch (err) { logMsg("Mic Error: " + (err.message || err)); stopMic(true); }
    }

    function stopMic(resetUI = true) {
        if (aiProcessor) { aiProcessor.disconnect(); aiProcessor = null; }
        if (audioStream) audioStream.getTracks().forEach(t => t.stop());
        if (audioContext && audioContext.state !== 'closed') audioContext.close();
        if (animId) cancelAnimationFrame(animId);
        audioDataBuffer = [];

        isMicActive = false; micState = 0;
        if (resetUI) {
            document.getElementById('listenBtn').innerText = "Turn On Mic";
            document.getElementById('listenBtn').style.background = "#28A745";
            document.getElementById('vol-bar').style.background = "#0f0";
            document.getElementById('vol-bar').style.width = "0%";
            document.getElementById('md-display').style.color = "#aaa";
            document.getElementById('ai-confidence').innerText = "AI: Waiting for engine...";
            logMsg("Mic Muted.");
        }
    }

    document.getElementById('listenBtn').addEventListener('click', async () => {
        if (isMicActive || wasMicActiveBeforeSleep) { wasMicActiveBeforeSleep = false; stopMic(true); }
        else { wasMicActiveBeforeSleep = false; startMic(); }
    });

    // =====================================================================
    // IOS MIC HEALTH WATCH (from V18)
    // =====================================================================
    document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
            if (isMicActive) {
                wasMicActiveBeforeSleep = true;
                stopMic(false);
                const btn = document.getElementById('listenBtn');
                btn.innerText = "Mic Paused 💤";
                btn.style.background = "#f39c12";
            }
        } else {
            if (wasMicActiveBeforeSleep) {
                wasMicActiveBeforeSleep = false;
                logMsg("Phone woke up. Auto-resuming Mic...");
                startMic();
            }
        }
    });

    setInterval(() => {
        if (isMicActive && !document.hidden) {
            let trackAlive   = audioStream && audioStream.getTracks().length > 0 && audioStream.getTracks()[0].readyState === 'live';
            let contextAlive = audioContext && audioContext.state === 'running';
            if (!trackAlive || !contextAlive) {
                logMsg("⚠️ iOS killed the mic stream. Resetting...");
                stopMic(true);
            }
        }
    }, 1500);

    // =====================================================================
    // VOICE TRIGGER  (unified for both volume and AI modes)
    // =====================================================================
    async function processVoiceTrigger(level, isAi) {
        if (!armedMode || micState !== 0) return;
        micState = 1;
        document.getElementById('vol-bar').style.background = "#f00";
        document.getElementById('md-display').style.color = "#ff4444";

        let cmdToSend = '';
        if (armedMode === 'H' || armedMode === 'L') { cmdToSend = armedMode; cancelMode(false); }
        else if (armedMode === 'D')  { cmdToSend = 'D1H'; cancelMode(false); }
        else if (armedMode === 'DR') { cmdToSend = 'D1L'; cancelMode(false); }
        else if (armedMode === 'HL') {
            if (hlStep === 0) { cmdToSend = 'H'; hlStep = 1; document.getElementById('arm-status').innerText = "ARMED: Now Pulling Low"; }
            else              { cmdToSend = 'L'; hlStep = 0; cancelMode(false); }
        }
        else if (armedMode === 'LH') {
            if (hlStep === 0) { cmdToSend = 'L'; hlStep = 1; document.getElementById('arm-status').innerText = "ARMED: Now Pulling High"; }
            else              { cmdToSend = 'H'; hlStep = 0; cancelMode(false); }
        }
        else if (armedMode === 'T') {
            if      (lastHouse === 'HL') { cmdToSend = (hlStep === 0) ? 'H' : 'L'; hlStep = (hlStep === 0) ? 1 : 0; }
            else if (lastHouse === 'LH') { cmdToSend = (hlStep === 0) ? 'L' : 'H'; hlStep = (hlStep === 0) ? 1 : 0; }
            else if (lastHouse === 'D')  cmdToSend = 'D1H';
            else if (lastHouse === 'DR') cmdToSend = 'D1L';
            else cmdToSend = lastHouse;
        }

        updateArmUI();
        let totalLockout = (dVal * 1000) + muteDelay;
        let label = isAi ? `AI ${Math.round(level)}%` : `Vol ${Math.round(level)}`;
        logMsg(`💥 TRIGGERED! (${label}) | Lockout: ${totalLockout}ms`);

        if (cmdToSend !== '') await sendBLECmd(cmdToSend);

        setTimeout(() => {
            micState = 2;
            audioDataBuffer = [];
            document.getElementById('vol-bar').style.background = "#f39c12";
            document.getElementById('md-display').style.color = "#aaa";
            logMsg("Lockout over. Waiting for quiet...");
        }, totalLockout);
    }

    // =====================================================================
    // UI — ARM / MODE
    // =====================================================================
    document.getElementById('syncBtn').addEventListener('click', () => {
        isSyncEnabled = !isSyncEnabled;
        const btn = document.getElementById('syncBtn');
        if (isSyncEnabled) { btn.innerText = "Sync: ON";  btn.style.background = "#17a2b8"; }
        else               { btn.innerText = "Sync: OFF"; btn.style.background = "#6c757d"; }
        logMsg(isSyncEnabled ? "Squad Sync ENABLED." : "Squad Sync DISABLED.");
    });

    document.getElementById('vmBtn').addEventListener('click', () => { setVoiceMode(!isVoiceMode, false); });

    function setVoiceMode(voiceEnabled, fromSync = false) {
        isVoiceMode = voiceEnabled;
        const btn = document.getElementById('vmBtn');
        if (isVoiceMode) { btn.innerText = "Mode: VOICE";  btn.style.background = "#9b59b6"; }
        else             { btn.innerText = "Mode: MANUAL"; btn.style.background = "#fd7e14"; cancelMode(true); }
        updateArmUI();
        if (!fromSync && isBleConnected && isSyncEnabled) sendBLECmd(isVoiceMode ? "MODE:VOICE" : "MODE:MANUAL", true);
    }

    window.adjDelay = function(type, amt) {
        if (!isBleConnected) return;
        if (type === 'D')  { dVal  = Math.max(0, dVal  + amt); document.getElementById('val-D').innerText  = dVal.toFixed(1)  + "s"; sendBLECmd("D"  + dVal.toFixed(1)); }
        else               { ddVal = Math.max(0, ddVal + amt); document.getElementById('val-DD').innerText = ddVal.toFixed(1) + "s"; sendBLECmd("DD" + ddVal.toFixed(1)); }
    };

    function updateArmUI() {
        document.querySelectorAll('.arm-btn').forEach(btn => btn.classList.remove('active'));
        const as = document.getElementById('arm-status');
        document.getElementById('btn-T').innerText = "T (" + lastHouse + ")";

        if (!isVoiceMode) {
            as.innerText = "MANUAL MODE (Tap to Fire)";
            as.style.color = "#fd7e14";
            return;
        }
        if (armedMode) document.getElementById('btn-' + armedMode).classList.add('active');
        if (!armedMode) { as.innerText = "SAFE / DISARMED"; as.style.color = "#aaa"; }
        else {
            as.style.color = "#ff4444";
            if      (armedMode === 'HL') as.innerText = hlStep === 0 ? "ARMED: High -> Low" : "ARMED: Now Pulling Low";
            else if (armedMode === 'LH') as.innerText = hlStep === 0 ? "ARMED: Low -> High" : "ARMED: Now Pulling High";
            else if (armedMode === 'T')  as.innerText = "REPEATING: " + lastHouse;
            else                         as.innerText = "ARMED: " + armedMode;
        }
    }

    window.cancelMode = function(fromSync = false) {
        armedMode = null; hlStep = 0; micState = 0;               // ← FIXED: reset micState like V18
        document.getElementById('vol-bar').style.background = "#0f0";
        document.getElementById('md-display').style.color = "#aaa";
        updateArmUI();
        if (!fromSync) logMsg(isVoiceMode ? "🚫 Cancelled. System SAFE." : "🔄 Sequence Reset.");
        if (!fromSync && isBleConnected && isSyncEnabled) sendBLECmd("MODE:CANCEL", true);
    };

    window.setMode = function(mode, fromSync = false) {
        if (!isVoiceMode && !fromSync) {
            let cmdToSend = '';
            if      (mode === 'H' || mode === 'L') { cmdToSend = mode;   hlStep = 0; lastHouse = mode; }
            else if (mode === 'D')  { cmdToSend = 'D1H'; hlStep = 0; lastHouse = 'D'; }
            else if (mode === 'DR') { cmdToSend = 'D1L'; hlStep = 0; lastHouse = 'DR'; }
            else if (mode === 'HL') { lastHouse = 'HL'; cmdToSend = (hlStep === 0) ? 'H' : 'L'; hlStep = (hlStep === 0) ? 1 : 0; }
            else if (mode === 'LH') { lastHouse = 'LH'; cmdToSend = (hlStep === 0) ? 'L' : 'H'; hlStep = (hlStep === 0) ? 1 : 0; }
            else if (mode === 'T') {
                if      (lastHouse === 'HL') { cmdToSend = (hlStep === 0) ? 'H' : 'L'; hlStep = (hlStep === 0) ? 1 : 0; }
                else if (lastHouse === 'LH') { cmdToSend = (hlStep === 0) ? 'L' : 'H'; hlStep = (hlStep === 0) ? 1 : 0; }
                else if (lastHouse === 'D')  cmdToSend = 'D1H';
                else if (lastHouse === 'DR') cmdToSend = 'D1L';
                else cmdToSend = lastHouse;
            }
            if (cmdToSend !== '') {
                sendBLECmd(cmdToSend);
                if (isSyncEnabled) sendBLECmd("MODE:MAN_UPDATE:" + lastHouse + ":" + hlStep, true);
                const btn = document.getElementById('btn-' + mode);
                if (btn) { btn.classList.add('active'); setTimeout(() => btn.classList.remove('active'), 200); }
                updateArmUI();
            }
            return;
        }

        if (!fromSync) {
            if (armedMode === mode) armedMode = null;
            else { armedMode = mode; if (mode !== 'T' && mode !== 'CANCEL') lastHouse = mode; }
        } else {
            armedMode = mode; if (mode !== 'T' && mode !== null && mode !== 'CANCEL') lastHouse = mode;
        }
        hlStep = 0; updateArmUI();
        if (!fromSync && isBleConnected && isSyncEnabled && isVoiceMode) {
            sendBLECmd(armedMode ? "MODE:" + armedMode + ":" + lastHouse : "MODE:CANCEL", true);
        }
    };

    // =====================================================================
    // BLE
    // =====================================================================
    document.getElementById('connectBtn').addEventListener('click', async () => {
        if (isBleConnected) { if (bleDevice && bleDevice.gatt.connected) bleDevice.gatt.disconnect(); return; }
        try {
            logMsg("Searching for BLUE Puller...");
            bleDevice = await navigator.bluetooth.requestDevice({ filters:[{ name: 'BLUE Puller' }], optionalServices:[SERVICE_UUID] });
            bleDevice.addEventListener('gattserverdisconnected', handleBleDisconnect);
            const server  = await bleDevice.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            bleCharacteristic    = await service.getCharacteristic(CHAR_RX_UUID);
            bleTxCharacteristic  = await service.getCharacteristic(CHAR_TX_UUID);
            await bleTxCharacteristic.startNotifications();
            bleTxCharacteristic.addEventListener('characteristicvaluechanged', handleBleNotifications);
            isBleConnected = true;
            document.getElementById('connectBtn').innerText = "Disconnect BLE";
            document.getElementById('connectBtn').style.background = "#dc3545";
            logMsg("BLE Connected! Syncing data...");
            setTimeout(() => { sendBLECmd("?"); }, 500);
        } catch (error) { logMsg("BLE Error: " + error); }
    });

    function handleBleDisconnect() {
        isBleConnected = false; bleCharacteristic = null; bleTxCharacteristic = null;
        document.getElementById('connectBtn').innerText = "Connect BLE";
        document.getElementById('connectBtn').style.background = "#007BFF";
        logMsg("BLE Disconnected.");
    }

    function handleBleNotifications(event) {
        let msg = new TextDecoder('utf-8').decode(event.target.value).trim();
        if (msg === "" || msg.startsWith("Err: Unknown")) return;

        if (msg === "GLOVE: CONNECTED") {
            logMsg("🤝 Glove joined. Pushing sync...");
            sendBLECmd("ACK:GLOVE", true);
            if (isSyncEnabled) setTimeout(() => { sendBLECmd(isVoiceMode ? "MODE:VOICE" : "MODE:MANUAL", true); }, 600);
            return;
        }

        if (msg === "AH")     { sendBLECmd("ACK:AH",     true); setTimeout(() => { setMode('H', true);    }, 400); return; }
        if (msg === "AL")     { sendBLECmd("ACK:AL",     true); setTimeout(() => { setMode('L', true);    }, 400); return; }
        if (msg === "AD")     { sendBLECmd("ACK:AD",     true); setTimeout(() => { setMode('D', true);    }, 400); return; }
        if (msg === "CANCEL") { sendBLECmd("ACK:CANCEL", true); setTimeout(() => { cancelMode(true);      }, 400); return; }

        if (msg.startsWith("MODE:")) {
            if (!isSyncEnabled) return;
            if (msg === "MODE:VOICE")  { setVoiceMode(true,  true); return; }
            if (msg === "MODE:MANUAL") { setVoiceMode(false, true); return; }
            let parts    = msg.split(":");
            let syncType = parts[1];
            if (syncType === "MAN_UPDATE") { lastHouse = parts[2]; if (parts[3]) hlStep = parseInt(parts[3]); updateArmUI(); return; }
            if (parts[2]) lastHouse = parts[2];
            if (syncType === "CANCEL") cancelMode(true);
            else setMode(syncType, true);
            return;
        }

        if (msg.includes("Delay Set:"))   { let m = msg.match(/Delay Set: ([\d\.]+)/);   if (m) { dVal     = parseFloat(m[1]); document.getElementById('val-D').innerText   = dVal.toFixed(1)  + "s"; } }
        if (msg.includes("Dbl Dly Set:")) { let m = msg.match(/Dbl Dly Set: ([\d\.]+)/); if (m) { ddVal    = parseFloat(m[1]); document.getElementById('val-DD').innerText  = ddVal.toFixed(1) + "s"; } }
        if (msg.includes("MD Set:"))      { let m = msg.match(/MD Set: (\d+)/);           if (m) { muteDelay= parseInt(m[1]);  document.getElementById('md-display').innerText = "Mute Delay (MD): " + muteDelay + "ms"; } }

        if (msg.includes("STATUS:")) {
            let dM  = msg.match(/Delay: ([\d\.]+)/);  if (dM)  { dVal     = parseFloat(dM[1]);  document.getElementById('val-D').innerText   = dVal.toFixed(1)  + "s"; }
            let ddM = msg.match(/Dbl: ([\d\.]+)/);    if (ddM) { ddVal    = parseFloat(ddM[1]); document.getElementById('val-DD').innerText  = ddVal.toFixed(1) + "s"; }
            let mdM = msg.match(/MD: (\d+)/);          if (mdM) { muteDelay= parseInt(mdM[1]);   document.getElementById('md-display').innerText = "Mute Delay (MD): " + muteDelay + "ms"; }
        }

        logMsg("📡 [TRAP]: " + msg);

        if      (msg === "CMD: High")                       { lastHouse = 'H';  updateArmUI(); }
        else if (msg === "CMD: Low")                        { lastHouse = 'L';  updateArmUI(); }
        else if (msg === "CMD: D1H" || msg === "CMD: Doubles") { lastHouse = 'D'; updateArmUI(); }
        else if (msg === "CMD: D1L")                        { lastHouse = 'DR'; updateArmUI(); }
    }

    async function sendBLECmd(cmd, silent = false) {
        if (bleCharacteristic && isBleConnected) {
            try {
                await bleCharacteristic.writeValue(new TextEncoder().encode(cmd));
                if (!silent) logMsg("🚀 SENT BLE: '" + cmd + "'");
            } catch (err) { logMsg("BLE Send Failed: " + err); }
        }
    }

</script>
