<!DOCTYPE html>
<html>
<head>
    <title>Voice Skeet Puller V4</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial; text-align: center; margin-top: 20px; background: #222; color: white;}
        .top-btn { padding: 15px; font-size: 18px; margin: 5px; border-radius: 8px; width: 40%; font-weight: bold;}
        
        /* Arming Panel Styles */
        #arm-panel { display: flex; justify-content: center; margin: 15px 5%; flex-wrap: wrap; }
        .arm-btn { 
            flex: 1 1 18%; padding: 15px 5px; margin: 3px; font-size: 20px; font-weight: bold;
            background: #444; color: white; border: 2px solid #222; border-radius: 8px;
        }
        .arm-btn.active { background: #e74c3c; border-color: #ffeb3b; color: white;} /* Red when armed */
        
        #arm-status { font-size: 24px; font-weight: bold; color: #aaa; margin-top: 10px; min-height: 30px;}
        #vol-bar-container { width: 90%; height: 25px; background: #444; margin: 10px auto; border-radius: 12px; overflow: hidden; }
        #vol-bar { width: 0%; height: 100%; background: #0f0; transition: width 0.1s; }
        #log { margin-top: 15px; color: #0f0; text-align: left; padding: 10px; font-size: 14px; background: #111; height: 180px; overflow-y: scroll; border: 1px solid #444;}
    </style>
</head>
<body>

    <h2>Voice Puller V4</h2>
    
    <div>
        <button id="connectBtn" class="top-btn" style="background: #007BFF; color: white;">Connect BLE</button>
        <button id="listenBtn" class="top-btn" style="background: #28A745; color: white;">Turn On Mic</button>
    </div>
    
    <!-- Arming Status -->
    <div id="arm-status">SAFE / DISARMED</div>

    <!-- Mode Buttons -->
    <div id="arm-panel">
        <button id="btn-H" class="arm-btn" onclick="setMode('H')">H</button>
        <button id="btn-L" class="arm-btn" onclick="setMode('L')">L</button>
        <button id="btn-D" class="arm-btn" onclick="setMode('D')">D</button>
        <button id="btn-HL" class="arm-btn" onclick="setMode('HL')">HL</button>
        <button id="btn-T" class="arm-btn" onclick="setMode('T')">T (H)</button>
    </div>
    
    <div>Mic Volume:</div>
    <div id="vol-bar-container"><div id="vol-bar"></div></div>
    
    <label for="threshSlider">Trigger Sensitivity: <span id="threshVal">50</span></label><br>
    <input type="range" id="threshSlider" min="5" max="150" value="50" style="width: 80%; margin-top: 10px;">

    <div id="log">--- Debug Log ---<br></div>

<script>
    // BLE Configuration
    const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
    const CHAR_RX_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
    let bleCharacteristic;
    
    // Trap State Variables
    let isCoolingDown = false;
    let threshold = 50;
    let audioContext;
    
    let armedMode = null;   // Can be 'H', 'L', 'D', 'HL', 'T', or null
    let hlStep = 0;         // 0 = Next is H, 1 = Next is L
    let lastHouse = 'H';    // Tracks the last triggered command for the 'T' button

    function logMsg(msg) {
        const logDiv = document.getElementById('log');
        logDiv.innerHTML = msg + "<br>" + logDiv.innerHTML;
    }

    document.getElementById('threshSlider').oninput = function() {
        threshold = this.value;
        document.getElementById('threshVal').innerText = threshold;
    }

    // --- ARMING LOGIC ---
    window.setMode = function(mode) {
        // If clicking the currently active mode, turn it off (Disarm)
        if (armedMode === mode) {
            armedMode = null;
        } else {
            armedMode = mode;
        }
        
        hlStep = 0; // Reset HL sequence
        
        // Update Button UI
        document.querySelectorAll('.arm-btn').forEach(btn => btn.classList.remove('active'));
        if (armedMode) {
            document.getElementById('btn-' + armedMode).classList.add('active');
        }
        
        // Update Text Status
        const as = document.getElementById('arm-status');
        if (!armedMode) {
            as.innerText = "SAFE / DISARMED";
            as.style.color = "#aaa";
            logMsg("System DISARMED.");
        } else {
            as.style.color = "#ff4444";
            if (armedMode === 'HL') {
                as.innerText = "ARMED: High -> Low";
            } else if (armedMode === 'T') {
                as.innerText = "REPEATING: " + lastHouse;
            } else {
                as.innerText = "ARMED: " + armedMode;
            }
            logMsg("Mode set to: " + armedMode);
        }
    };

    // --- BLE CONNECTION ---
    document.getElementById('connectBtn').addEventListener('click', async () => {
        try {
            logMsg("Searching for BLUE Puller...");
            const device = await navigator.bluetooth.requestDevice({
                filters:[{ name: 'BLUE Puller' }],
                optionalServices:[SERVICE_UUID]
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            bleCharacteristic = await service.getCharacteristic(CHAR_RX_UUID);
            
            document.getElementById('connectBtn').innerText = "BLE Connected 🟢";
            document.getElementById('connectBtn').style.background = "#28A745";
            logMsg("BLE Connected successfully.");
        } catch (error) {
            logMsg("BLE Error: " + error);
        }
    });

    // --- MIC & VOLUME LOGIC ---
    document.getElementById('listenBtn').addEventListener('click', async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            
            window.AudioContext = window.AudioContext || window.webkitAudioContext;
            audioContext = new window.AudioContext();
            if (audioContext.state === 'suspended') await audioContext.resume();
            
            if (audioContext.state !== 'running') {
                logMsg("ERROR: iOS Audio Engine failed to start.");
                return;
            }

            document.getElementById('listenBtn').innerText = "Mic Active 🎤";
            logMsg("Mic successfully activated!");

            const analyser = audioContext.createAnalyser();
            const microphone = audioContext.createMediaStreamSource(stream);
            
            analyser.fftSize = 256;
            microphone.connect(analyser);
            const dataArray = new Uint8Array(analyser.frequencyBinCount);

            function checkVolume() {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for(let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                let averageVolume = sum / dataArray.length;
                
                // Animate bar
                document.getElementById('vol-bar').style.width = Math.min(100, (averageVolume / 1.5)) + "%";

                // Trigger check
                if (averageVolume > threshold && !isCoolingDown) {
                    processVoiceTrigger(averageVolume);
                }
                requestAnimationFrame(checkVolume);
            }
            checkVolume();
        } catch (err) {
            logMsg("Mic Error: " + (err.message || err));
        }
    });

    // --- FIRING LOGIC ---
    async function processVoiceTrigger(vol) {
        if (!armedMode) return; // Do nothing if safe/disarmed

        isCoolingDown = true;
        document.getElementById('vol-bar').style.background = "#f00"; 
        
        let cmdToSend = '';

        if (armedMode === 'H' || armedMode === 'L' || armedMode === 'D') {
            cmdToSend = armedMode;
            lastHouse = armedMode;
            setMode(null); // Auto-Disarm
        } 
        else if (armedMode === 'HL') {
            if (hlStep === 0) {
                cmdToSend = 'H';
                lastHouse = 'H';
                hlStep = 1; // Advance to next step, remain armed
                document.getElementById('arm-status').innerText = "ARMED: Now Pulling Low";
                logMsg("HL Sequence: H fired. Next is L.");
            } else {
                cmdToSend = 'L';
                lastHouse = 'L';
                setMode(null); // Auto-Disarm after L
                logMsg("HL Sequence Complete.");
            }
        } 
        else if (armedMode === 'T') {
            cmdToSend = lastHouse; // Continuous repeat
        }

        // Update the T button label so the user knows what it will do next time
        document.getElementById('btn-T').innerText = "T (" + lastHouse + ")";

        logMsg("💥 LOUD NOISE (Vol: " + Math.round(vol) + ")");
        
        if (bleCharacteristic && cmdToSend !== '') {
            try {
                let encoder = new TextEncoder('utf-8');
                await bleCharacteristic.writeValue(encoder.encode(cmdToSend));
                logMsg("🚀 SENT BLE: '" + cmdToSend + "'");
            } catch (err) {
                logMsg("BLE Send Failed: " + err);
            }
        } else if (!bleCharacteristic) {
            logMsg("⚠️ Disconnected! Attempted to send: " + cmdToSend);
        }

        // 2-Second Cooldown between shots
        setTimeout(() => {
            isCoolingDown = false;
            document.getElementById('vol-bar').style.background = "#0f0";
        }, 2000);
    }
</script>
</body>
</html>
